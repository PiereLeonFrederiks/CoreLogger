<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sediment Core Logger | Professional</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header-section">
            <svg class="soil-logo" viewBox="10 10 10 " xmlns="http://www.w3.org/2000/svg">
                <rect x="35" y="10" width="30" height="80" fill="none" stroke="#2c3e50" stroke-width="3"/>
                <rect x="35" y="10" width="30" height="15" fill="#5d4037"/>
                <rect x="35" y="25" width="30" height="25" fill="#8d6e63"/>
                <rect x="35" y="50" width="30" height="20" fill="#bcaaa4"/>
                <rect x="35" y="70" width="30" height="20" fill="#d7ccc8"/>
                <line x1="30" y1="25" x2="70" y2="25" stroke="#2c3e50" stroke-width="1"/>
                <line x1="30" y1="50" x2="70" y2="50" stroke="#2c3e50" stroke-width="1"/>
                <line x1="30" y1="70" x2="70" y2="70" stroke="#2c3e50" stroke-width="1"/>
            </svg>
            <h1>Core Logger <small>v0.9</small></h1>
        </div>
        
        <div class="input-section">
            <div class="input-grid">
                <input type="text" id="coreId" placeholder="Core ID">
                <div class="depth-range">
                    <input type="number" id="depthFrom" placeholder="From (m)" step="0.01">
                    <input type="number" id="depthTo" placeholder="To (m)" step="0.01">
                </div>
            </div>
            <input type="text" id="soilColor" placeholder="Munsell / Color">
            <textarea id="soilDesc" placeholder="Field Description (e.g., sandy silt with pebbles)"></textarea>
            <button onclick="addLayer()" class="btn-primary">Add Layer</button>
        </div>

        <div class="table-container">
    <table id="logTable">
        <thead>
            <tr>
                <th>Core ID</th>
                <th>Depth (m)</th>
                <th>Color</th>
                <th>Class</th>
                <th>Field Description</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>
<button onclick="copyToClipboard()" class="btn-secondary">Export to Clipboard (TSV)</button>
<div class="graph-section">
    <h3>Stratigraphic Profile</h3>
    <div class="canvas-wrapper">
        <canvas id="coreCanvas"></canvas>
    </div>
</div>

<div class="export-actions">
    <button onclick="exportImage('jpg')" class="btn-export">Download JPG</button>
    <button onclick="exportSVG()" class="btn-export">Download SVG</button>
</div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
